<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restroom Radar — EXO Stadium</title>
  <meta name="description" content="Find the nearest restroom with the shortest wait time in real-time.">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏟️</text></svg>">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orbs">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
  </div>
  <div class="noise-overlay"></div>

  <div class="app-container">
    <nav class="navbar">
      <a href="/" class="nav-brand">
        <div class="nav-logo">EX</div>
        <span class="nav-title">EXO</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/stadium">Stadium Map</a></li>
        <li><a href="/concessions">Order Food</a></li>
        <li><a href="/restrooms" class="active">Restrooms</a></li>
      </ul>
      <div class="nav-status">
        <span class="status-dot"></span>
        Live
      </div>
    </nav>

    <main class="page-content">
      <div class="page-header">
        <h1>🚻 Restroom Radar</h1>
        <p>Real-time wait times and occupancy — updated every 15 seconds</p>
      </div>

      <div class="restroom-grid" id="restroomGrid">
        <!-- Populated by JS -->
      </div>
    </main>

    <footer class="footer">
      <p>EXO Stadium Platform &copy; 2026</p>
    </footer>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/restrooms.js"></script>
</body>
</html>
